<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found · Himalayan Healing School</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Raleway:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Raleway', sans-serif;
      background: #080418;
      color: #F9F5FF;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .symbol { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.8; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 300; color: #D8B4FE; margin-bottom: 1rem; }
    p  { color: rgba(249,245,255,0.65); font-size: 1rem; max-width: 400px; line-height: 1.7; margin-bottom: 2.5rem; }
    a  {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      background: linear-gradient(135deg, #6B21A8, #A855F7);
      color: #fff; text-decoration: none; border-radius: 50px;
      font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase;
      box-shadow: 0 4px 20px rgba(168,85,247,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(168,85,247,0.5); }
    .gold { color: #F5C842; }
  </style>
</head>
<body>
  <div class="symbol">🏔️</div>
  <h1>Sacred path<br/><span class="gold">not found</span></h1>
  <p>The page you are looking for may have moved, or perhaps the universe is guiding you back to your centre.</p>
  <a href="/">Return to Himalayan Healing School</a>
</body>
</html>
